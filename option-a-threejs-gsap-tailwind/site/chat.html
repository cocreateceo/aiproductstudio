    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary)',
                        secondary: 'var(--secondary)',
                        accent: 'var(--accent)',
                    },
                    fontFamily: {
                        sans: ['DM Sans', 'system-ui', 'sans-serif'],
                        display: ['Outfit', 'DM Sans', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts - CoCreate Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CoCreate Theme CSS -->
    <link rel="stylesheet" href="css/themes/ember.css">
    <link rel="stylesheet" href="css/themes/coral.css">
    <link rel="stylesheet" href="css/themes/sunset.css">
    <link rel="stylesheet" href="css/themes/aurora.css">
    <link rel="stylesheet" href="css/themes/legacy.css">
    <link rel="stylesheet" href="css/themes/sandstone.css">
    <link rel="stylesheet" href="css/themes/champagne.css">
    <link rel="stylesheet" href="css/themes/zoom.css">

    <!-- Unified Theme System (MUST be before any rendering) -->
    <script src="js/theme.js"></script>

    <!-- Centralized Configuration -->
    <script src="js/config.js"></script>

    <!-- Chat Widget Styles -->
    <link rel="stylesheet" href="css/chat-widget.css">

    <!-- html2canvas for screenshots -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Fixed Page Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/cocreate_bg.png') center bottom / cover no-repeat;
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse 120% 100% at 50% 100%, transparent 30%, rgba(26, 10, 0, 0.6) 100%),
                linear-gradient(90deg, rgba(26, 10, 0, 0.65) 0%, rgba(26, 10, 0, 0.3) 40%, transparent 60%),
                linear-gradient(180deg, rgba(26, 10, 0, 0.5) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        :root {
            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: 'DM Sans', system-ui, sans-serif;
            color: var(--text-primary);
        }

        /* CoCreate Typography */
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Outfit', 'DM Sans', system-ui, sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Popup window specific styles */
        #chat-widget {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .chat-sidebar {
            position: relative !important;
            top: 0 !important;
            right: 0 !important;
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            border-radius: 0 !important;
            transform: none !important;
            opacity: 1 !important;
            pointer-events: auto !important;
            display: flex !important;
            flex-direction: column;
        }

        .chat-sidebar.open {
            transform: none !important;
        }

        /* Hide elements not needed in popup */
        .chat-toggle,
        .chat-resize-handle {
            display: none !important;
        }

        /* Header styling for popup */
        .chat-header {
            border-radius: 0 !important;
            flex-shrink: 0;
        }

        /* Messages area fills remaining space */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
        }

        /* Input area at bottom */
        .chat-input-area {
            flex-shrink: 0;
        }

        /* Page context indicator */
        .page-context-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 6px 16px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .page-context-bar svg {
            width: 12px;
            height: 12px;
            opacity: 0.6;
        }

        .page-context-bar .page-name {
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
    <!-- cocreate-seo -->
    <link rel="canonical" href="https://www.cocreateidea.com/chat.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CoCreate Idea">
    <meta property="og:title" content="CoCreate - Chat">
    <meta property="og:description" content="Chat with CoCreate assistant to learn about our AI co-founder partnership model.">

    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

</head>
<body>
    <!-- Page Context Bar -->
    <div id="page-context-bar" class="page-context-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Viewing:</span>
        <span id="current-page" class="page-name">Home</span>
    </div>

    <!-- Chat Widget Container -->
    <div id="chat-widget-container"></div>

    <script src="js/chat-widget.js"></script>
    <script>
        // Page context received from parent window
        let pageContext = {
            page: 'index',
            title: 'CoCreate',
            url: ''
        };

        // Update page context display
        function updatePageContextDisplay() {
            const pageNameEl = document.getElementById('current-page');
            if (pageNameEl) {
                // Format page name nicely
                let displayName = pageContext.page || 'Home';
                displayName = displayName.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                if (displayName === 'Index') displayName = 'Home';
                pageNameEl.textContent = displayName;
            }
        }

        // Listen for messages from parent/opener window
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data || !data.type) return;

            if (data.type === 'pageContext') {
                pageContext = {
                    page: data.page || 'index',
                    title: data.title || 'CoCreate',
                    url: data.url || ''
                };
                console.log('[Chat Popup] Page context updated:', pageContext);
                updatePageContextDisplay();

                // Update chat widget's context
                if (window.chatWidget) {
                    window.chatWidget.setPageContext(pageContext);
                }
            }

            if (data.type === 'setTheme') {
                if (window.ThemeManager) {
                    window.ThemeManager.set(data.theme);
                } else {
                    document.documentElement.setAttribute('data-theme', data.theme);
                    localStorage.setItem('theme', data.theme);
                }
            }
        });

        // Initialize chat widget
        window.chatWidget = new ChatWidget({
            title: 'CoCreate',
            subtitle: 'Online - Ready to help',
            welcomeMessage: `Hi there! Welcome to CoCreate!

I'm here to answer any questions about our partnership model. We help business founders launch AI-powered products in just 2 weeks.

What would you like to know?`,
            startOpen: false,
            containerId: 'chat-widget-container',
            iframeMode: false,
            getPageContext: () => pageContext
        });

        // Notify opener that chat is ready
        if (window.opener) {
            window.opener.postMessage({ type: 'chatReady' }, '*');
        }

        // Apply saved theme using ThemeManager
        if (window.ThemeManager) {
            window.ThemeManager.init();
        }

        // Update context display
        updatePageContextDisplay();

        // Handle window close
        window.addEventListener('beforeunload', () => {
            if (window.opener) {
                window.opener.postMessage({ type: 'chatClosed' }, '*');
            }
        });
    </script>
</body>
</html>
