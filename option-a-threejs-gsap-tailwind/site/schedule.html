<!DOCTYPE html>
<html lang="en" data-theme="ember">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Schedule Your Call | CoCreate AI</title>
    <meta name="description" content="Schedule an introduction call with CoCreate AI to discuss your product idea.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary)',
                        secondary: 'var(--secondary)',
                        accent: 'var(--accent)',
                    },
                    fontFamily: {
                        sans: ['DM Sans', 'system-ui', 'sans-serif'],
                        display: ['Outfit', 'DM Sans', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts - CoCreate Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CoCreate Theme CSS -->
    <link rel="stylesheet" href="css/themes/ember.css">
    <link rel="stylesheet" href="css/themes/coral.css">
    <link rel="stylesheet" href="css/themes/sunset.css">
    <link rel="stylesheet" href="css/themes/aurora.css">
    <link rel="stylesheet" href="css/themes/legacy.css">

    <!-- Unified Theme System (MUST be before any rendering) -->
    <script src="js/theme.js"></script>

    <!-- Centralized Configuration -->
    <script src="js/config.js"></script>

    <!-- Page Styles -->
    <link rel="stylesheet" href="css/chat-widget.css">
    <link rel="stylesheet" href="css/scheduler.css">

    <style>
        /* Fixed Page Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/cocreate_bg.png') center bottom / cover no-repeat;
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse 120% 100% at 50% 100%, transparent 30%, rgba(26, 10, 0, 0.6) 100%),
                linear-gradient(90deg, rgba(26, 10, 0, 0.65) 0%, rgba(26, 10, 0, 0.3) 40%, transparent 60%),
                linear-gradient(180deg, rgba(26, 10, 0, 0.5) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        :root {
            --transition-speed: 0.4s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        /* CoCreate Typography - Outfit for headings */
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Outfit', 'DM Sans', system-ui, sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            transition: background var(--transition-speed) ease, border-color var(--transition-speed) ease;
        }

        .text-theme-primary { color: var(--text-primary); }
        .text-theme-secondary { color: var(--text-secondary); }
        .border-theme { border-color: var(--border-color); }

        /* Header Styles */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        header a {
            transition: all 0.2s ease;
        }

        header a:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="w-10 h-10 flex items-center justify-center transition-transform group-hover:scale-105">
                    <svg class="w-10 h-10" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="headerLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:var(--accent, #FFC36A)"/>
                                <stop offset="50%" style="stop-color:var(--secondary, #FD6C71)"/>
                                <stop offset="100%" style="stop-color:var(--primary, #FC2A0D)"/>
                            </linearGradient>
                        </defs>
                        <g transform="translate(4, 4)">
                            <path d="M20 0C8.954 0 0 8.954 0 20s8.954 20 20 20c5.523 0 10.523-2.239 14.142-5.858"
                                  stroke="url(#headerLogoGradient)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                            <ellipse cx="20" cy="20" rx="26" ry="10"
                                     stroke="url(#headerLogoGradient)" stroke-width="2" fill="none"
                                     transform="rotate(-30, 20, 20)"/>
                            <circle cx="42" cy="12" r="3.5" fill="url(#headerLogoGradient)"/>
                        </g>
                    </svg>
                </div>
                <span class="text-xl font-display font-bold tracking-tight">
                    <span class="text-theme-primary">CO</span><span class="gradient-text">CREATE</span>
                </span>
            </a>
            <a href="index.html" class="flex items-center gap-1 text-sm text-theme-secondary hover:text-theme-primary">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Home
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="py-8 px-4">

        <!-- Error Message -->
        <div id="error-message" class="error-message max-w-3xl mx-auto hidden"></div>

        <!-- Scheduler Container -->
        <div id="scheduler-container" class="scheduler-container">

            <!-- Header -->
            <div class="scheduler-header">
                <h1 class="font-display">Schedule Your Introduction Call</h1>
                <div class="scheduler-meta">
                    <span>30 min</span>
                    <span>Google Meet</span>
                    <span>CEO - CoCreate</span>
                </div>
            </div>

            <!-- Main Grid -->
            <div class="scheduler-grid">

                <!-- Calendar Section -->
                <div class="calendar-section">
                    <div class="calendar-header">
                        <h3 class="font-display">Select Date</h3>
                        <div class="calendar-nav">
                            <button id="prev-month" title="Previous month">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                                </svg>
                            </button>
                            <span id="calendar-month" class="calendar-month font-display">January 2026</span>
                            <button id="next-month" title="Next month">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        <!-- Rendered by JS -->
                    </div>
                </div>

                <!-- Time Slots Section -->
                <div id="timeslots-section" class="timeslots-section">
                    <h3 class="font-display">Select Time</h3>
                    <div id="timeslots-date" class="timeslots-date">Select a date</div>
                    <div id="timeslots-container" class="timeslots-container">
                        <div class="timeslots-empty">Please select a date from the calendar</div>
                    </div>
                    <div class="timezone-select">
                        <label>Timezone</label>
                        <select id="timezone-select">
                            <option value="America/New_York">Eastern Time (ET)</option>
                            <option value="America/Chicago">Central Time (CT)</option>
                            <option value="America/Denver">Mountain Time (MT)</option>
                            <option value="America/Los_Angeles">Pacific Time (PT)</option>
                            <option value="America/Phoenix">Arizona (MST)</option>
                            <option value="America/Anchorage">Alaska (AKT)</option>
                            <option value="Pacific/Honolulu">Hawaii (HST)</option>
                            <option value="Europe/London">London (GMT/BST)</option>
                            <option value="Europe/Paris">Paris (CET)</option>
                            <option value="Europe/Berlin">Berlin (CET)</option>
                            <option value="Asia/Dubai">Dubai (GST)</option>
                            <option value="Asia/Kolkata">India (IST)</option>
                            <option value="Asia/Singapore">Singapore (SGT)</option>
                            <option value="Asia/Tokyo">Tokyo (JST)</option>
                            <option value="Australia/Sydney">Sydney (AEST)</option>
                        </select>
                    </div>
                </div>

                <!-- Details Section -->
                <div class="details-section">
                    <h3 class="font-display">Your Details</h3>

                    <div class="form-group">
                        <label for="scheduler-name">Name *</label>
                        <input type="text" id="scheduler-name" placeholder="Your name" required>
                    </div>

                    <div class="form-group">
                        <label for="scheduler-email">Email *</label>
                        <input type="email" id="scheduler-email" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="scheduler-idea">Product Idea *</label>
                        <input type="text" id="scheduler-idea" placeholder="Brief description of your idea" required>
                    </div>

                    <div class="form-group">
                        <label for="scheduler-notes">Notes (optional)</label>
                        <textarea id="scheduler-notes" placeholder="Anything you'd like us to know before the call..."></textarea>
                    </div>

                    <button id="submit-booking" class="submit-btn" disabled>Schedule Call</button>
                </div>

            </div>
        </div>

        <!-- Confirmation Container (hidden by default) -->
        <div id="confirmation-container" class="confirmation-container hidden">
            <div class="confirmation-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h2 class="font-display">You're All Set!</h2>

            <div class="booking-details">
                <p><span id="confirmation-date"></span></p>
                <p><span id="confirmation-time"></span> (<span id="confirmation-timezone"></span>)</p>
                <p>Google Meet</p>

                <div id="conf-meet-container" class="meet-link-box">
                    <a id="meet-link" href="#" target="_blank"></a>
                    <button id="copy-link-btn">Copy Link</button>
                </div>
            </div>

            <p class="confirmation-note">
                A calendar invite has been sent to your email address.
            </p>

            <div class="confirmation-actions">
                <button id="go-home-btn" class="btn-primary">Back to Home</button>
            </div>
        </div>

    </main>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
    </div>

    <!-- Scheduler Script -->
    <script src="js/scheduler.js"></script>

</body>
</html>
