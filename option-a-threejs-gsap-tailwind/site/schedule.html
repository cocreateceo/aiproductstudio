<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Schedule Your Call | CoCreate AI</title>
    <meta name="description" content="Schedule an introduction call with CoCreate AI to discuss your product idea.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary)',
                        secondary: 'var(--secondary)',
                        accent: 'var(--accent)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Centralized Configuration -->
    <script src="js/config.js"></script>

    <!-- Unified Theme System -->
    <script src="js/theme.js"></script>

    <!-- Page Styles -->
    <link rel="stylesheet" href="css/chat-widget.css">
    <link rel="stylesheet" href="css/scheduler.css">
</head>
<body class="min-h-screen" style="background: var(--bg-primary); color: var(--text-primary);">

    <!-- Header -->
    <header class="border-b" style="border-color: var(--border-color); background: var(--bg-secondary);">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: linear-gradient(135deg, var(--primary), var(--secondary));">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <span class="text-xl font-bold gradient-text">CoCreate AI</span>
            </a>
            <a href="index.html" class="flex items-center gap-1 text-sm" style="color: var(--text-secondary);">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Home
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="py-8 px-4">

        <!-- Error Message -->
        <div id="error-message" class="error-message max-w-3xl mx-auto hidden"></div>

        <!-- Scheduler Container -->
        <div id="scheduler-container" class="scheduler-container">

            <!-- Header -->
            <div class="scheduler-header">
                <h1>Schedule Your Introduction Call</h1>
                <div class="scheduler-meta">
                    <span>30 min</span>
                    <span>Google Meet</span>
                    <span>CEO - CoCreate</span>
                </div>
            </div>

            <!-- Main Grid -->
            <div class="scheduler-grid">

                <!-- Calendar Section -->
                <div class="calendar-section">
                    <div class="calendar-header">
                        <h3>Select Date</h3>
                        <div class="calendar-nav">
                            <button id="prev-month" title="Previous month">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                                </svg>
                            </button>
                            <span id="calendar-month" class="calendar-month">January 2026</span>
                            <button id="next-month" title="Next month">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        <!-- Rendered by JS -->
                    </div>
                </div>

                <!-- Time Slots Section -->
                <div id="timeslots-section" class="timeslots-section">
                    <h3>Select Time</h3>
                    <div id="timeslots-date" class="timeslots-date">Select a date</div>
                    <div id="timeslots-container" class="timeslots-container">
                        <div class="timeslots-empty">Please select a date from the calendar</div>
                    </div>
                    <div class="timezone-select">
                        <label>Timezone</label>
                        <select id="timezone-select">
                            <option value="America/New_York">Eastern Time (ET)</option>
                            <option value="America/Chicago">Central Time (CT)</option>
                            <option value="America/Denver">Mountain Time (MT)</option>
                            <option value="America/Los_Angeles">Pacific Time (PT)</option>
                            <option value="America/Phoenix">Arizona (MST)</option>
                            <option value="America/Anchorage">Alaska (AKT)</option>
                            <option value="Pacific/Honolulu">Hawaii (HST)</option>
                            <option value="Europe/London">London (GMT/BST)</option>
                            <option value="Europe/Paris">Paris (CET)</option>
                            <option value="Europe/Berlin">Berlin (CET)</option>
                            <option value="Asia/Dubai">Dubai (GST)</option>
                            <option value="Asia/Kolkata">India (IST)</option>
                            <option value="Asia/Singapore">Singapore (SGT)</option>
                            <option value="Asia/Tokyo">Tokyo (JST)</option>
                            <option value="Australia/Sydney">Sydney (AEST)</option>
                        </select>
                    </div>
                </div>

                <!-- Details Section -->
                <div class="details-section">
                    <h3>Your Details</h3>

                    <div class="form-group">
                        <label for="scheduler-name">Name *</label>
                        <input type="text" id="scheduler-name" placeholder="Your name" required>
                    </div>

                    <div class="form-group">
                        <label for="scheduler-email">Email *</label>
                        <input type="email" id="scheduler-email" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="scheduler-idea">Product Idea *</label>
                        <input type="text" id="scheduler-idea" placeholder="Brief description of your idea" required>
                    </div>

                    <div class="form-group">
                        <label for="scheduler-notes">Notes (optional)</label>
                        <textarea id="scheduler-notes" placeholder="Anything you'd like us to know before the call..."></textarea>
                    </div>

                    <button id="submit-booking" class="submit-btn" disabled>Schedule Call</button>
                </div>

            </div>
        </div>

        <!-- Confirmation Container (hidden by default) -->
        <div id="confirmation-container" class="confirmation-container hidden">
            <div class="confirmation-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h2>You're All Set!</h2>

            <div class="booking-details">
                <p><span id="confirmation-date"></span></p>
                <p><span id="confirmation-time"></span> (<span id="confirmation-timezone"></span>)</p>
                <p>Google Meet</p>

                <div id="conf-meet-container" class="meet-link-box">
                    <a id="meet-link" href="#" target="_blank"></a>
                    <button id="copy-link-btn">Copy Link</button>
                </div>
            </div>

            <p class="confirmation-note">
                A calendar invite has been sent to your email address.
            </p>

            <div class="confirmation-actions">
                <button id="go-home-btn" class="btn-primary">Back to Home</button>
            </div>
        </div>

    </main>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
    </div>

    <!-- Scheduler Script -->
    <script src="js/scheduler.js"></script>

</body>
</html>
