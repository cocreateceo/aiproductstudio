<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC36A"/>
      <stop offset="50%" style="stop-color:#FD6C71"/>
      <stop offset="100%" style="stop-color:#FC2A0D"/>
    </linearGradient>
  </defs>

  <!-- C letter with orbit ring -->
  <g transform="translate(4, 4)">
    <!-- Outer C shape -->
    <path d="M20 0C8.954 0 0 8.954 0 20s8.954 20 20 20c5.523 0 10.523-2.239 14.142-5.858"
          stroke="url(#iconGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Orbit ring around C -->
    <ellipse cx="20" cy="20" rx="26" ry="10"
             stroke="url(#iconGradient)" stroke-width="2.5" fill="none"
             transform="rotate(-30, 20, 20)"/>

    <!-- Small orbit dot -->
    <circle cx="42" cy="12" r="4" fill="url(#iconGradient)"/>
  </g>
</svg>
