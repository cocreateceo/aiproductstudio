<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC36A"/>
      <stop offset="50%" style="stop-color:#FD6C71"/>
      <stop offset="100%" style="stop-color:#FC2A0D"/>
    </linearGradient>
  </defs>

  <!-- C letter with orbit ring -->
  <g transform="translate(5, 5)">
    <!-- Outer C shape -->
    <path d="M20 0C8.954 0 0 8.954 0 20s8.954 20 20 20c5.523 0 10.523-2.239 14.142-5.858"
          stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Orbit ring around C -->
    <ellipse cx="20" cy="20" rx="28" ry="12"
             stroke="currentColor" stroke-width="2" fill="none"
             transform="rotate(-30, 20, 20)"/>

    <!-- Small orbit dot -->
    <circle cx="44" cy="12" r="3" fill="currentColor"/>
  </g>

  <!-- CREATE text -->
  <text x="65" y="32" font-family="Outfit, sans-serif" font-size="24" font-weight="600" fill="currentColor" letter-spacing="0.05em">
    CREATE
  </text>

  <!-- TM symbol -->
  <text x="178" y="18" font-family="DM Sans, sans-serif" font-size="8" fill="currentColor" opacity="0.7">
    TM
  </text>
</svg>
