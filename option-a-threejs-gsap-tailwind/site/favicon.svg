<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="favGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC36A"/>
      <stop offset="50%" style="stop-color:#FD6C71"/>
      <stop offset="100%" style="stop-color:#FC2A0D"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1A0A00"/>

  <!-- C with orbit -->
  <g transform="translate(3, 3)">
    <!-- C shape -->
    <path d="M13 2C6.373 2 1 7.373 1 14s5.373 12 12 12c3.314 0 6.314-1.343 8.485-3.515"
          stroke="url(#favGradient)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Orbit ring -->
    <ellipse cx="13" cy="14" rx="15" ry="6"
             stroke="url(#favGradient)" stroke-width="1.5" fill="none"
             transform="rotate(-30, 13, 14)"/>

    <!-- Orbit dot -->
    <circle cx="26" cy="8" r="2.5" fill="url(#favGradient)"/>
  </g>
</svg>
